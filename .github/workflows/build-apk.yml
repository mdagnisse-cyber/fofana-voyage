name: Construire l'APK Android

# Se lance automatiquement a chaque envoi (push) sur la branche main,
# ou manuellement depuis l'onglet "Actions" de GitHub ("Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances systeme
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Installer Buildozer et Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Construire l'APK (debug)
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          yes | buildozer android debug

      - name: Recuperer l'APK genere
        uses: actions/upload-artifact@v4
        with:
          name: fofana-voyage-apk
          path: bin/*.apk
